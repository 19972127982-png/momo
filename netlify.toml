# Netlify 部署配置（仅部署 apps/web 这个 Next.js 站点）
# 站点根目录设为 apps/web；Netlify 会自动识别 Next.js 并启用 Next Runtime，
# 把 /api/chat 这类 Route Handler 部署成 Netlify Function。

[build]
  base = "apps/web"
  command = "pnpm build"
  # monorepo 标准写法：publish 相对 base（= apps/web/.next）。
  # 必须与下面显式声明的插件「一起」用：
  #   - 只写 publish 不写插件 → 被当纯静态目录发布 → 404
  #   - 只写插件不写 publish → 适配器在 base 目录找不到 .next → onBuild 失败
  publish = ".next"

[build.environment]
  # Next 15/16 推荐 Node 20/22；用 22 稳定且受支持
  NODE_VERSION = "22"
  # 仓库里还有 desktop 包依赖 electron，构建网站时无需下载其二进制，跳过以提速并避免失败
  ELECTRON_SKIP_BINARY_DOWNLOAD = "1"

# 显式声明运行时插件：让它读取 apps/web/.next，生成 SSR/Route Handler 函数与路由重写，
# 避免 monorepo 下自动注入不触发（否则站点只会被当静态目录 → 404）。
[[plugins]]
  package = "@netlify/plugin-nextjs"
