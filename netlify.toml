# Netlify 部署配置（仅部署 apps/web 这个 Next.js 站点）
# 站点根目录设为 apps/web；Netlify 会自动识别 Next.js 并启用 Next Runtime，
# 把 /api/chat 这类 Route Handler 部署成 Netlify Function。

[build]
  base = "apps/web"
  command = "pnpm build"
  # 发布目录交给 Next Runtime 插件自动设置（不要手动写 .next，否则会被当成纯静态目录 → 404）。

[build.environment]
  # Next 15/16 推荐 Node 20/22；用 22 稳定且受支持
  NODE_VERSION = "22"
  # 仓库里还有 desktop 包依赖 electron，构建网站时无需下载其二进制，跳过以提速并避免失败
  ELECTRON_SKIP_BINARY_DOWNLOAD = "1"

# 不手动声明 @netlify/plugin-nextjs：让 Netlify 自动探测 Next.js 并注入 OpenNext 适配器，
# 自动注入会正确处理 monorepo 的包路径（base=apps/web → apps/web/.next）。
# 同理不要设置 publish，显式 publish 会抑制自动注入、把站点当成纯静态目录发布。
