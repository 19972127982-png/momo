packages:
  - "apps/*"
  - "packages/*"

# pnpm 11+ requires explicit approval for package build scripts to run
# (security feature; without this electron binary won't download)
allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  # Next.js 图片优化用 sharp（@echopet/web）
  sharp: true
  # tesseract.js 唯一的 build 脚本是 opencollective 捐赠横幅，无需运行
  tesseract.js: false

onlyBuiltDependencies:
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
  - sharp
